<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Jiooo ✨</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe6e6;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #ff4d6d;
            font-size: 22px;
            margin-bottom: 20px;
        }
        input[type="password"] {
            width: 80%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ff4d6d;
            border-radius: 25px;
            outline: none;
            text-align: center;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #ff4d6d;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background-color: #c9184a;
            transform: scale(1.05);
        }
        #pesan-eror {
            color: #d90429;
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="box-login">
            <h1>Eitss, ikan hiu punya bulu, jawab duluuu 🔐</h1>
            <p style="font-size: 13px; color: #666;">Petunjuk: Tanggal cantik kita</p>
            
            <!-- -->
            <input type="password" id="input-pass" placeholder="Ketik di sini...">
            <br>
            <button onclick="cekPassword()">Unlock 💖</button>
            
            <!-- -->
            <div id="pesan-eror"></div>
        </div>

        <!-- Halaman Rahasia yang awalnya disembunyikan -->
        <div id="halaman-rahasia" style="display: none;">
            <h1>Yeayyy! Akses Diterima! 🥰❤️</h1>
            <p>Successfully decrypted dengan penuh cinta!</p>
            <p style="font-size: 15px; color: #555;">Aku cuma mau bilang makasih ya Jiooo udah selalu sabar sama aku hehehe. Dila loves you!</p>
        </div>
    </div>

    <script>
        function cekPassword() {
            const passwordUser = document.getElementById("input-pass").value;
            const boxLogin = document.getElementById("box-login");
            const halamanRahasia = document.getElementById("halaman-rahasia");
            const pesanEror = document.getElementById("pesan-eror");

            // 
            // 
            if (passwordUser.toLowerCase() === "231123") {
                boxLogin.style.display = "none"; // Sembunyikan kotak login
                halamanRahasia.style.display = "block"; // Munculkan halaman rahasia
            } else {
                pesanEror.innerHTML = "❌ Net Not!!! Masa lupa lagi??";
            }
        }
    </script>

</body>
</html>
