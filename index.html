<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Jiooo ✨</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe6e6;
            overflow: hidden; 
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 30px;
        }
        input[type="password"] {
            width: 80%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ff4d6d;
            border-radius: 25px;
            outline: none;
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            height: 50px;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.2s;
        }
        #btn-mau {
            background-color: #ff4d6d;
            color: white;
        }
        #btn-mau:hover {
            background-color: #c9184a;
            transform: scale(1.1);
        }
        #btn-gamau {
            background-color: #ccc;
            color: #333;
            position: absolute; 
            left: 55%; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="box-login">
            <h1>Masukkan Password untuk Kenal Dila 🔐</h1>
            <p style="font-size: 13px; color: #666;">Petunjuk: Nama panggilan kesayangan kamu dari Dila (huruf kecil semua)</p>
            
            <!-- Kotak Input Password -->
            <input type="password" id="input-pass" placeholder="Ketik di sini...">
            <br>
            <button onclick="cekPassword()">Unlock 💖</button>
            
            <!-- Tempat muncul pesan kalau password salah -->
            <div id="pesan-eror"></div>
        </div>
        
        <!-- -->
        <h1 id="teks-pertanyaan">Jiooo, Jio sayang Dila gak? 🥺❤️</h1>
        
        <div class="btn-group">
            <!-- -->
            <button id="btn-mau" onclick="pilihMau()">Sayang dong, sayang mahadahsyatttt!!!!</button>
            
            <!-- -->
            <button id="btn-gamau" onmouseover="kabur()" onclick="kabur()">Emoh ah!</button>
        </div>
    </div>

    <script>
        // 
        function kabur() {
            const btnGaMau = document.getElementById("btn-gamau");
            
            // 
            const x = Math.random() * (window.innerWidth - btnGaMau.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - btnGaMau.offsetHeight - 50);
            
            // 
            btnGaMau.style.position = "fixed";
            btnGaMau.style.left = x + "px";
            btnGaMau.style.top = y + "px";
        }

        // 
        function pilihMau() {
            const pertanyaan = document.getElementById("teks-pertanyaan");
            const btnGroup = document.querySelector(".btn-group");
            
            // 
            pertanyaan.innerHTML = "Yeayyy! I knew it! 🥰<br><br><span style='font-size: 16px; color: #555;'>Aku juga sayang Jiooo hehehe!</span>";
            btnGroup.style.display = "none";
        }
    </script>

</body>
</html>
